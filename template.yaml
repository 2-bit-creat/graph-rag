AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Graph RAG FastAPI backend on AWS Lambda (container image) via a Function URL

Parameters:
  DatabaseUrl:
    Type: String
    NoEcho: true
    Description: Async Postgres URL, e.g. postgresql+asyncpg://... (Neon pooled endpoint recommended)
  OpenAiApiKey:
    Type: String
    NoEcho: true
  JwtSecret:
    Type: String
    NoEcho: true
    Description: Long random string for signing auth tokens. Required — the app refuses to boot in production on the placeholder default.
  Environment:
    Type: String
    Default: production
    AllowedValues: [production, development]
    Description: Deployment environment. "production" enforces auth (no token-less fallback) and rejects an insecure JWT secret.
  CorsOrigins:
    Type: String
    Default: ""
    Description: Comma-separated allowed web origins (e.g. the CloudFront domain serving the Flutter web build). Leave empty for a native-only mobile client. Do NOT use "*" — the app also allows credentials in dev.
  S3Bucket:
    Type: String
    Default: ""
    Description: Media bucket for audio uploads + quiz TTS. Leave empty only for a short-lived smoke test — Lambda's filesystem does not persist, so any real deployment must set this.
  MediaBaseUrl:
    Type: String
    Default: ""
    Description: Public base URL (typically a CloudFront domain) fronting S3Bucket, used to build playable media URLs.
  DbRequireSsl:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: Neon (and most managed Postgres) require TLS.
  DbDisablePreparedCache:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: Required when DatabaseUrl points at Neon's pooled (-pooler) endpoint (PgBouncer transaction mode).
  DbLambdaPooling:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: Skip SQLAlchemy's connection pool in favor of the DB-side pooler — keeps cold Lambda containers from exhausting Neon's free-tier connection cap.
  RunDbMigrations:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: Run init_db()'s ~90 idempotent schema statements at cold start. Each is a real round trip to a remote DB (measured ~60-70s total against Neon) — fine once, but eats most of the cold-start timeout budget on every container otherwise. Set "true" for the first deploy against a fresh DB (or after adding a new migration), then flip back to "false".

Globals:
  Function:
    Timeout: 120
    MemorySize: 1024
    # x86_64, not arm64/Graviton: emulated arm64 builds hit a Docker Desktop
    # containerd export bug on this machine (see backend/Dockerfile). Costs
    # ~20% more per ms than Graviton would, but builds reliably.
    Architectures: [x86_64]
    # No ReservedConcurrentExecutions: this account's whole-region Lambda
    # concurrency limit is 10 (AWS's brand-new-account default before a quota
    # increase), and AWS requires >=10 UNRESERVED remain after any reservation
    # — so no positive reservation is possible here. The account-wide limit of
    # 10 already acts as the cost ceiling. Revisit once a quota increase is
    # requested/granted.

Resources:
  GraphRagFunction:
    Type: AWS::Serverless::Function
    Metadata:
      Dockerfile: Dockerfile
      DockerContext: ./backend
      DockerTag: latest
    Properties:
      PackageType: Image
      Policies:
        # storage.py's boto3 put_object/list_objects_v2/delete_objects calls
        # (audio uploads, quiz TTS) had no IAM permission at all before this —
        # the function's role was CloudWatch-Logs-only. Scoped to just the
        # media bucket, not a blanket S3 policy.
        - S3CrudPolicy:
            BucketName: !Ref S3Bucket
      Environment:
        Variables:
          DATABASE_URL: !Ref DatabaseUrl
          OPENAI_API_KEY: !Ref OpenAiApiKey
          CORS_ORIGINS: !Ref CorsOrigins
          ENVIRONMENT: !Ref Environment
          JWT_SECRET: !Ref JwtSecret
          S3_BUCKET: !Ref S3Bucket
          MEDIA_BASE_URL: !Ref MediaBaseUrl
          DB_REQUIRE_SSL: !Ref DbRequireSsl
          DB_DISABLE_PREPARED_CACHE: !Ref DbDisablePreparedCache
          DB_LAMBDA_POOLING: !Ref DbLambdaPooling
          RUN_DB_MIGRATIONS: !Ref RunDbMigrations
      FunctionUrlConfig:
        AuthType: NONE
        # No Cors block here — FastAPI's own CORSMiddleware (main.py, driven by
        # CORS_ORIGINS) is the single source of truth for CORS. Function URL's
        # native CORS handling would add its own Access-Control-Allow-Origin on
        # top of the app's, and the browser rejects a response with the same
        # header appearing twice ("multiple values ... only one is allowed").

Outputs:
  FunctionUrl:
    Description: Lambda Function URL — set as API_BASE_URL for the Flutter build (no trailing slash)
    Value: !GetAtt GraphRagFunctionUrl.FunctionUrl
