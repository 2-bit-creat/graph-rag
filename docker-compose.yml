services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: graph-rag-postgres
    restart: unless-stopped
    environment:
      # Local-dev defaults; override via env (e.g. an .env next to this file) for
      # any non-local deployment. Never ship the defaults to production.
      POSTGRES_USER: ${POSTGRES_USER:-graphrag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-graphrag}
      POSTGRES_DB: ${POSTGRES_DB:-graphrag}
    ports:
      - "6432:5432"
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-graphrag} -d ${POSTGRES_DB:-graphrag}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: graph-rag-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: graph-rag-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./minio_data:/data

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: graph-rag-worker
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-graphrag}:${POSTGRES_PASSWORD:-graphrag}@postgres:5432/${POSTGRES_DB:-graphrag}
      REDIS_URL: redis://redis:6379/0
      GRAPH_PROCESSING_ASYNC: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/uploads:/app/uploads
