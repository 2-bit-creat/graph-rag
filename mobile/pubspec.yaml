name: graphrag_mobile
description: GraphRAG personalized daily English learning app
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  dio: ^5.7.0
  record: ^5.2.0
  file_picker: ^8.1.7
  desktop_drop: 0.7.1
  path_provider: ^2.1.5
  intl: ^0.20.2
  cupertino_icons: ^1.0.8
  audioplayers: ^6.7.1
  fl_chart: ^0.69.0
  flutter_math_fork: ^0.7.4
  shared_preferences: ^2.3.2
dependency_overrides:
  record_platform_interface: 1.2.0
  record_android: 1.3.1
  record_web: 1.1.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  generate: true
